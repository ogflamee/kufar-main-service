<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Форма объявления</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 24px;
            color: #2d3748;
        }

        .page-shell {
            max-width: 1100px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 18px;
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.18);
            overflow: hidden;
        }

        .content {
            padding: 34px;
        }

        .form-card {
            max-width: 760px;
            margin: 0 auto;
            background: #f8fafc;
            border: 1px solid #e5e7eb;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 6px 20px rgba(15, 23, 42, 0.06);
        }

        .form-title {
            font-size: 1.9rem;
            color: #1f2937;
            margin-bottom: 8px;
        }

        .form-subtitle {
            color: #64748b;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #374151;
            font-weight: 600;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid #cbd5e1;
            outline: none;
            font-size: 1rem;
            color: #1f2937;
            background: white;
        }

        textarea {
            min-height: 130px;
            resize: vertical;
        }

        input:focus, textarea:focus, select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.12);
        }

        .field-error {
            margin-top: 6px;
            color: #dc2626;
            font-size: 0.9rem;
        }

        .actions {
            display: flex;
            gap: 12px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-block;
            padding: 12px 18px;
            border: none;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.35);
        }

        .btn-light {
            background: #eef2ff;
            color: #4338ca;
        }

        .btn-light:hover {
            background: #e0e7ff;
        }

        @media (max-width: 700px) {
            .row {
                grid-template-columns: 1fr;
            }

            body {
                padding: 12px;
            }

            .content {
                padding: 18px;
            }

            .form-card {
                padding: 20px 16px;
            }
        }
    </style>
</head>
<body>
<div class="page-shell">
    <div th:replace="~{fragments/header :: header}"></div>

    <div class="content">
        <div class="form-card">
            <h1 class="form-title" th:text="${pageTitle}">Создать объявление</h1>
            <p class="form-subtitle">Заполни информацию о товаре или услуге.</p>

            <form th:action="${formAction}" th:object="${ad}" method="post">
                <div class="form-group">
                    <label for="title">Название</label>
                    <input id="title" type="text" th:field="*{title}" placeholder="Например, iPhone 13" required>
                    <div class="field-error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
                </div>

                <div class="form-group">
                    <label for="description">Описание</label>
                    <textarea id="description" th:field="*{description}" placeholder="Опиши товар подробнее" required></textarea>
                    <div class="field-error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
                </div>

                <div class="row">
                    <div class="form-group">
                        <label for="price">Цена</label>
                        <input id="price" type="number" step="0.01" th:field="*{price}" placeholder="100.00" required>
                        <div class="field-error" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                    </div>

                    <div class="form-group">
                        <label for="city">Город</label>
                        <input id="city" type="text" th:field="*{city}" placeholder="Минск" required>
                        <div class="field-error" th:if="${#fields.hasErrors('city')}" th:errors="*{city}"></div>
                    </div>
                </div>

                <div class="row">
                    <div class="form-group">
                        <label for="categoryId">Категория</label>
                        <select id="categoryId" th:field="*{categoryId}" required>
                            <option value="">Выбери категорию</option>
                            <option th:each="category : ${categories}"
                                    th:value="${category.id}"
                                    th:text="${category.name}">
                            </option>
                        </select>
                        <div class="field-error" th:if="${#fields.hasErrors('categoryId')}" th:errors="*{categoryId}"></div>
                    </div>

                    <div class="form-group">
                        <label for="status">Статус</label>
                        <select id="status" th:field="*{status}">
                            <option th:each="status : ${statuses}"
                                    th:value="${status}"
                                    th:text="${status}">
                            </option>
                        </select>
                    </div>
                </div>

                <div class="actions">
                    <button type="submit" class="btn btn-primary" th:text="${submitLabel}">Сохранить</button>
                    <a th:href="@{/ads}" class="btn btn-light">Отмена</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
