server:
  port: 8080

spring:
  application:
    name: kufar-main-service

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

services:
  chat-service:
    url: http://localhost:8081
